<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>IRC</title>
    <link rel="stylesheet" href="css/app.css" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #app {
            width: 100%;
            height: 100%;
        }

        .xterm,
        .xterm-viewport,
        .xterm-screen {
            width: 100% !important;
        }

        /* hide ttyd's own reconnect overlay — app.js handles reconnection */
        #overlay {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script src="js/app.js"></script>
</body>

</html>
