<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>IRC</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm@6.0.0/css/xterm.css">
</head>

<body>
    <div id="admin-panel" class="modal"></div>

    <div id="terminal-container">
        <div id="terminal"></div>
    </div>

    <div id="status-bar">
        <div id="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
            <span id="user-info"></span>
            <span id="admin-link" style="display:none">Admin</span>
        </div>
        <div id="actions">
            <button class="btn" id="btn-reset" title="Reset session">Reset</button>
        </div>
    </div>
    <script src="https://unpkg.com/@xterm/xterm@6.0.0/lib/xterm.js"></script>
    <script src="https://unpkg.com/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
    <script src="https://unpkg.com/@xterm/addon-web-links@0.12.0/lib/addon-web-links.js"></script>
    <script src="/js/admin.js?=v3"></script>
    <script src="/js/app.js?=v3"></script>
</body>

</html>
