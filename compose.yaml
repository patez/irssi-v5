name: irssi-v5

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: irssi-v5:latest
    container_name: irssi-v5
    restart: always
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      PORT:             "3001"
      BASE_URL:         "${BASE_URL}"
      CF_AUD:           "${CF_AUD}"
      CF_TEAM_DOMAIN:   "${CF_TEAM_DOMAIN}"
      ADMIN_USERS:      "${ADMIN_USERS}"
      DEV_MODE:         "${DEV_MODE:-false}"
      DEV_USER:         "${DEV_USER:-devuser}"
      DTACH_SESSION:    "${DTACH_SESSION:-false}"
      SOJU_SOCKET:      "/soju/soju.sock"
      IRC_ADDR:         "${IRC_ADDR}"
      IRC_NETWORK_NAME: "${IRC_NETWORK_NAME}"
      PUBLIC_DIR:       "./public"
      TTYD_INDEX:       "/app/public/ttyd.html"
      RUST_LOG:         "irssi_v5=info,warn"
      LANG:             en_US.UTF-8
      LC_ALL:           en_US.UTF-8
    volumes:
      - irssi-v5-data:/data
      - soju-socket:/soju       # socket shared from soju/ stack
      - ./public:/app/public:ro # frontend edits live without rebuild
    networks:
      - web
      - soju-internal
    cap_add:
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  irssi-v5-data:
  soju-socket:
    external: true
    name: soju-socket

networks:
  web:
    external: true
  soju-internal:
    external: true
    name: soju-internal